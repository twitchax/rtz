on: [push]

name: Build and Test

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@main
      # --force: rust-cache restores binstall's install manifest (.crates.toml)
      # without the binaries, so a plain binstall skips them and cargo reports
      # "no such command: nextest". Forcing a reinstall keeps the binary present.
      - run: cargo binstall -y --force cargo-nextest
      - run: cargo nextest run --features web

  codecov:
    needs: test
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y --force cargo-nextest cargo-llvm-cov
      - run: cargo llvm-cov nextest --workspace --features web --lcov --output-path coverage.lcov
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov

  build_windows:
    needs: test
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw-w64
        run: sudo apt-get install mingw-w64
      # Pin the action to the toolchain rust-toolchain.toml selects (1.93) and add
      # the Windows target to IT. With @stable, the target's std lands on whatever
      # stable release is current while the toml override builds on 1.93, so the
      # std is missing ("can't find crate for `core`"). Prebuilt std also makes
      # -Zbuild-std (which needs nightly anyway, so it never worked here) redundant.
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --features full --target x86_64-pc-windows-gnu --release
      - uses: actions/upload-artifact@v4
        with:
          name: rtz_x86_64-pc-windows-gnu
          path: target/x86_64-pc-windows-gnu/release/rtz.exe

  build_linux:
    needs: test
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --features full --target x86_64-unknown-linux-gnu --release
      - uses: actions/upload-artifact@v4
        with:
          name: rtz_x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/rtz

  build_macos:
    needs: test
    name: Build MacOS
    # macos-latest is Apple Silicon, so aarch64-apple-darwin is the native target.
    # (The old pin, macos-12, was retired by GitHub and left this job queued
    # forever.) Pin the toolchain to match rust-toolchain.toml, as in the Windows
    # job, so there is no drift between the installed toolchain and the build.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: aarch64-apple-darwin
      - run: cargo build --features full --target aarch64-apple-darwin --release
      - uses: actions/upload-artifact@v4
        with:
          name: rtz_aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/rtz
