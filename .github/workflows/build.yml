on: [push]

name: Build and Test

env:
  # Stable pin, matching `rust-toolchain.toml`. Only the coverage job uses nightly (for
  # `#[coverage(off)]`); everything else — build, test, publish — is stable.
  RUST_TOOLCHAIN: "1.93"
  # Authenticate cargo-binstall's GitHub API calls so concurrent jobs don't
  # exhaust the unauthenticated rate limit.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: cargo-bins/cargo-binstall@main
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
      # Force-install the test tools AFTER rust-cache restore: the cache restores
      # binstall's install manifest without the binaries, so a plain binstall skips
      # them and `cargo nextest` reports "no such command". (See commit beafd8d.)
      - run: cargo binstall cargo-make cargo-nextest --force --no-confirm
      - run: cargo make test

  codecov:
    needs: test
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Coverage needs nightly so `cargo llvm-cov` sets `coverage_nightly` (activating the
      # `#[coverage(off)]` exclusions). This is the only job that uses nightly; the Makefile
      # `codecov` task invokes `cargo +nightly` to override the stable pin.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: cargo-bins/cargo-binstall@main
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
      # Force-install after cache restore — see the Test job for why.
      - run: cargo binstall cargo-make cargo-nextest cargo-llvm-cov --force --no-confirm
      - run: cargo make codecov
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: twitchax/rtz
          files: coverage.lcov

  build_windows:
    needs: test
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-gnu
      - uses: cargo-bins/cargo-binstall@main
      - uses: Swatinem/rust-cache@v2
      - run: cargo binstall cargo-make --force --no-confirm
      - run: cargo make build-windows
      - uses: actions/upload-artifact@v4
        with:
          name: rtz_x86_64-pc-windows-gnu
          path: target/x86_64-pc-windows-gnu/release/rtz.exe

  build_linux:
    needs: test
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu
      - uses: cargo-bins/cargo-binstall@main
      - uses: Swatinem/rust-cache@v2
      - run: cargo binstall cargo-make --force --no-confirm
      - run: cargo make build-linux
      - uses: actions/upload-artifact@v4
        with:
          name: rtz_x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/rtz

  build_macos:
    needs: test
    name: Build MacOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-darwin
      - uses: cargo-bins/cargo-binstall@main
      - uses: Swatinem/rust-cache@v2
      - run: cargo binstall cargo-make --force --no-confirm
      - run: cargo make build-macos
      - uses: actions/upload-artifact@v4
        with:
          name: rtz_aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/rtz
